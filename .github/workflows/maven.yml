name: Java CI with Maven

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up JDK 25
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '25'
        distribution: 'microsoft'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
